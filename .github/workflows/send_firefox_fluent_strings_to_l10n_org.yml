# Workflow to open a PR on mozilla-l10n/www-l10n with
# new strings that exist in Springfield and need localising

name: Open Fluent PR for Firefox.com

on:
  workflow_run:
    #workflows: ["Build and push a Docker image"]
    workflows: ["Unit tests"]
    types: [completed]
    branches: [main]
  # push:
  #   paths:
  #     - "l10n/**/*"
  #   branches:
  #     - main
  workflow_dispatch:
  schedule:
    - cron: "15 5 * * *" # Every 5:15 AM UTC

jobs:
  open_l10n_pr:
    # if: github.repository == 'mozmeao/springfield'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Use commit/ref $GIT_SHA"
        env:
          GIT_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.GIT_SHA }}
      - run: git shortlog HEAD..HEAD^
        #run: FLUENT_REPO_AUTH=${{ secrets.FLUENT_REPO_AUTH }} bin/open-ftl-pr.sh
